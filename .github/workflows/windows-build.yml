name: Windows Build and Release

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    name: Build ${{ matrix.output }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - output: themida_dumper_x64.exe
            mode_define: MODE_THEMIDA
            compiler: x86_64-w64-mingw32-gcc
          - output: themida_dumper_x86.exe
            mode_define: MODE_THEMIDA
            compiler: i686-w64-mingw32-gcc
          - output: vmprotect_dumper_x64.exe
            mode_define: MODE_VMPROTECT
            compiler: x86_64-w64-mingw32-gcc
          - output: vmprotect_dumper_x86.exe
            mode_define: MODE_VMPROTECT
            compiler: i686-w64-mingw32-gcc
          - output: runtime_dumper_x64.exe
            mode_define: MODE_RUNTIME
            compiler: x86_64-w64-mingw32-gcc
          - output: runtime_dumper_x86.exe
            mode_define: MODE_RUNTIME
            compiler: i686-w64-mingw32-gcc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MinGW-w64
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64

      - name: Compile
        run: |
          mkdir -p dist
          ${{ matrix.compiler }} -O2 -s -static -DDEFAULT_MODE=${{ matrix.mode_define }} \
            -o dist/${{ matrix.output }} themida_dumper_universal.c

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: dist/${{ matrix.output }}

  release:
    name: Publish release assets
    if: startsWith(github.ref, 'refs/tags/')
    needs: build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.exe
